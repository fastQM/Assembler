<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assembler Tetris</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a31;
      --ink: #e8ecff;
      --muted: #98a3c7;
      --line: #2a3763;
      --accent: #5ea1ff;
      --accent-2: #2f6cff;
      --danger: #ff5c7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "SF Pro Text", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% -20%, #1b2a52, var(--bg) 48%);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .app {
      width: min(960px, 100%);
      display: grid;
      gap: 14px;
      grid-template-columns: 300px 1fr;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 16px 30px rgba(2, 8, 23, .35);
    }
    .title { margin: 0 0 6px; font-size: 26px; letter-spacing: .02em; }
    .sub { margin: 0; color: var(--muted); font-size: 13px; }
    .stats { margin-top: 12px; display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
    .stat { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #0f1730; }
    .stat b { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .stat span { font-size: 24px; font-weight: 700; color: #dce4ff; }
    .next-box { margin-top: 12px; border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #0f1730; }
    .controls { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button {
      border: 1px solid var(--line);
      background: #1a2750;
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary { background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-color: #4f81d9; }
    button.warn { background: #3a1a2a; border-color: #6e2a48; color: #ffd9e3; }
    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .board-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 640px;
      background: #0f1730;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    #board { border: 3px solid #3856a6; border-radius: 10px; background: #070b17; }
    #next { width: 100%; max-width: 120px; border: 2px solid #3856a6; border-radius: 8px; background: #070b17; }
    .status { margin-top: 10px; font-size: 13px; color: #c9d6ff; min-height: 20px; }
    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      .board-wrap { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <h1 class="title">Assembler Tetris</h1>
      <p class="sub">Single-player mode</p>

      <div class="stats">
        <div class="stat"><b>Score</b><span id="score">0</span></div>
        <div class="stat"><b>Lines</b><span id="lines">0</span></div>
        <div class="stat"><b>Level</b><span id="level">1</span></div>
        <div class="stat"><b>Best</b><span id="best">0</span></div>
      </div>

      <div class="next-box">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Next</div>
        <canvas id="next" width="120" height="120"></canvas>
      </div>

      <div class="controls">
        <button class="primary" id="startBtn">Start / Resume</button>
        <button id="pauseBtn">Pause</button>
        <button id="restartBtn">Restart</button>
        <button class="warn" id="backBtn">Back</button>
      </div>

      <div class="status" id="status">Ready.</div>

      <div class="hint">
        Controls<br/>
        `←` `→` Move, `↑` Rotate, `↓` Soft drop, `Space` Hard drop, `P` Pause
      </div>
    </section>

    <section class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
    </section>
  </div>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const CELL = 30;
    const boardCanvas = document.getElementById('board');
    const boardCtx = boardCanvas.getContext('2d');
    const nextCanvas = document.getElementById('next');
    const nextCtx = nextCanvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const levelEl = document.getElementById('level');
    const bestEl = document.getElementById('best');
    const statusEl = document.getElementById('status');

    const SHAPES = {
      I: [[1,1,1,1]],
      O: [[1,1],[1,1]],
      T: [[0,1,0],[1,1,1]],
      S: [[0,1,1],[1,1,0]],
      Z: [[1,1,0],[0,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]],
    };

    const COLORS = {
      I:'#42d9ff', O:'#ffd14a', T:'#b37dff', S:'#69f07f', Z:'#ff6f8f', J:'#6d8bff', L:'#ffa45a'
    };

    let board = createBoard();
    let current = null;
    let next = randomPiece();
    let score = 0;
    let lines = 0;
    let level = 1;
    let dropTimer = 0;
    let dropInterval = 900;
    let lastTime = 0;
    let running = false;
    let gameOver = false;
    let best = Number(localStorage.getItem('assembler_tetris_best') || '0');
    bestEl.textContent = best;

    function createBoard() {
      return Array.from({length: ROWS}, () => Array(COLS).fill(null));
    }

    function cloneMatrix(m) {
      return m.map(r => r.slice());
    }

    function randomPiece() {
      const keys = Object.keys(SHAPES);
      const k = keys[Math.floor(Math.random() * keys.length)];
      return { key: k, shape: cloneMatrix(SHAPES[k]), x: 0, y: 0 };
    }

    function spawnPiece() {
      current = next;
      next = randomPiece();
      current.x = Math.floor((COLS - current.shape[0].length) / 2);
      current.y = -1;
      if (collides(current.shape, current.x, current.y + 1)) {
        running = false;
        gameOver = true;
        setStatus('Game over. Press Restart.');
      }
      drawNext();
    }

    function collides(shape, x, y) {
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (!shape[r][c]) continue;
          const nx = x + c;
          const ny = y + r;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      }
      return false;
    }

    function mergeCurrent() {
      for (let r = 0; r < current.shape.length; r++) {
        for (let c = 0; c < current.shape[r].length; c++) {
          if (!current.shape[r][c]) continue;
          const x = current.x + c;
          const y = current.y + r;
          if (y >= 0) board[y][x] = current.key;
        }
      }
    }

    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(Boolean)) {
          board.splice(r, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          r++;
        }
      }
      if (cleared > 0) {
        lines += cleared;
        score += [0, 100, 300, 500, 800][cleared] * level;
        level = Math.min(20, Math.floor(lines / 10) + 1);
        dropInterval = Math.max(120, 920 - (level - 1) * 40);
      }
    }

    function rotate(shape) {
      const rows = shape.length;
      const cols = shape[0].length;
      const out = Array.from({length: cols}, () => Array(rows).fill(0));
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          out[c][rows - 1 - r] = shape[r][c];
        }
      }
      return out;
    }

    function hardDrop() {
      while (!collides(current.shape, current.x, current.y + 1)) current.y++;
      tickLock();
    }

    function tickLock() {
      mergeCurrent();
      clearLines();
      spawnPiece();
      syncUI();
    }

    function move(dx) {
      if (!running || gameOver) return;
      const nx = current.x + dx;
      if (!collides(current.shape, nx, current.y)) current.x = nx;
    }

    function softDrop() {
      if (!running || gameOver) return;
      if (!collides(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 1;
      } else {
        tickLock();
      }
    }

    function rotateCurrent() {
      if (!running || gameOver) return;
      const rs = rotate(current.shape);
      if (!collides(rs, current.x, current.y)) {
        current.shape = rs;
        return;
      }
      if (!collides(rs, current.x - 1, current.y)) { current.x--; current.shape = rs; return; }
      if (!collides(rs, current.x + 1, current.y)) { current.x++; current.shape = rs; }
    }

    function drawCell(ctx, x, y, color, size) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, size, size);
      ctx.strokeStyle = 'rgba(7,11,23,.35)';
      ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);
    }

    function drawBoard() {
      boardCtx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
      boardCtx.fillStyle = '#070b17';
      boardCtx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board[r][c];
          if (cell) drawCell(boardCtx, c * CELL, r * CELL, COLORS[cell], CELL);
        }
      }

      if (current) {
        for (let r = 0; r < current.shape.length; r++) {
          for (let c = 0; c < current.shape[r].length; c++) {
            if (!current.shape[r][c]) continue;
            const x = current.x + c;
            const y = current.y + r;
            if (y >= 0) drawCell(boardCtx, x * CELL, y * CELL, COLORS[current.key], CELL);
          }
        }
      }
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.fillStyle = '#070b17';
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      const shape = next.shape;
      const size = 24;
      const w = shape[0].length * size;
      const h = shape.length * size;
      const ox = Math.floor((nextCanvas.width - w) / 2);
      const oy = Math.floor((nextCanvas.height - h) / 2);
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (shape[r][c]) drawCell(nextCtx, ox + c * size, oy + r * size, COLORS[next.key], size);
        }
      }
    }

    function syncUI() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
      if (score > best) {
        best = score;
        localStorage.setItem('assembler_tetris_best', String(best));
        bestEl.textContent = best;
      }
    }

    function setStatus(s) { statusEl.textContent = s; }

    function resetGame() {
      board = createBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 900;
      dropTimer = 0;
      gameOver = false;
      current = null;
      next = randomPiece();
      spawnPiece();
      syncUI();
      setStatus('Ready. Press Start / Resume.');
      drawBoard();
    }

    function startGame() {
      if (gameOver) resetGame();
      running = true;
      setStatus('Playing...');
    }

    function pauseGame() {
      running = false;
      if (!gameOver) setStatus('Paused.');
    }

    function loop(ts) {
      const delta = ts - lastTime;
      lastTime = ts;
      if (running && !gameOver) {
        dropTimer += delta;
        if (dropTimer >= dropInterval) {
          dropTimer = 0;
          if (!collides(current.shape, current.x, current.y + 1)) current.y++;
          else tickLock();
          syncUI();
        }
      }
      drawBoard();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); move(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); rotateCurrent(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); softDrop(); }
      else if (e.key === ' ') { e.preventDefault(); if (running && !gameOver) hardDrop(); }
      else if (e.key.toLowerCase() === 'p') { e.preventDefault(); running ? pauseGame() : startGame(); }
      drawBoard();
      syncUI();
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('pauseBtn').addEventListener('click', pauseGame);
    document.getElementById('restartBtn').addEventListener('click', () => { resetGame(); startGame(); });
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '/apps/social-web/web/index.html';
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
