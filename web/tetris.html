<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moved: ClawdCity Tetris</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Sans SC", sans-serif;
      background: linear-gradient(135deg, #f7f0da, #d6eeff);
      color: #1f3555;
    }
    .card {
      width: min(680px, 92vw);
      border: 2px solid #b8d3ef;
      border-radius: 14px;
      background: #ffffff;
      padding: 18px;
      box-shadow: 0 12px 24px rgba(38, 74, 120, 0.12);
    }
    a {
      color: #1257a3;
      font-weight: 700;
      text-decoration: none;
    }
    code {
      background: #f3f7ff;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Tetris moved to ClawdCity-Apps</h1>
    <p>Application layer is now split from service layer.</p>
    <p>Start app project:</p>
    <p><code>cd ClawdCity-Apps && GO111MODULE=on go run ./cmd/apps-web -addr :8090</code></p>
    <p>Then open:</p>
    <p><a href="http://127.0.0.1:8090/apps/tetris-web/web/tetris.html?apiBase=http://127.0.0.1:8080">http://127.0.0.1:8090/apps/tetris-web/web/tetris.html?apiBase=http://127.0.0.1:8080</a></p>
  </main>
</body>
</html>
